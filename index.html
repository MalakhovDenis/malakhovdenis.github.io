<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Денис Малахов | IT Manager (Заглушка)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --secondary-text: #94a3b8;
            --card-bg: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid #334155;
        }

        .avatar {
            width: 96px;
            height: 96px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            margin: 0 auto 20px;
            border: 3px solid var(--accent-color);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-badge {
            display: inline-block;
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 30px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .status-badge::before {
            content: "•";
            color: #10b981;
            margin-right: 6px;
            font-size: 18px;
            vertical-align: middle;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            background-color: #1e293b;
            color: var(--text-color);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 16px;
            border: 1px solid #475569;
            transition: all 0.2s ease-in-out;
        }

        .link-btn:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        footer {
            margin-top: 35px;
            font-size: 12px;
            color: var(--secondary-text);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Аватарка (можно заменить на <img src="your-photo.jpg" class="avatar" alt="...">) -->
        <div class="avatar">ДЕ</div>

        <h1>Денис Малахов</h1>
        <div class="subtitle">IT Manager</div>

        <div class="status-badge">Сайт в разработке. Доступен для проектов.</div>

        <div class="links">
            <a href="https://github.com/MalakhovDenis" target="_blank" class="link-btn">GitHub</a>
            <a href="https://linkedin.com/in/yourusername" target="_blank" class="link-btn">LinkedIn</a>
            <a href="https://t.me/DeMALAKHOV" target="_blank" class="link-btn">Telegram</a>
            <a href="mailto:de.malakhov@gmail.com" class="link-btn">Email</a>
        </div>

        <footer>
            &copy; 2026. Делай. Без delay
        </footer>
    </div>

</body>
</html>
